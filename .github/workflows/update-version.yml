name: Update version
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  update:
    uses: podmania/actions/.github/workflows/update-version.yml@main
    with:
      package: mariadb
      upstream: MariaDB/server
      tag-prefix: mariadb-
      fetcher: fetchurl
      fetch-url: 'https://archive.mariadb.org/mariadb-${VERSION}/source/mariadb-${VERSION}.tar.gz'
      unpack: false
      use-tags-api: true
